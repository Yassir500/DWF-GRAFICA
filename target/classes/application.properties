# Nombre de la aplicaciïŋ―n para identificarla en Grafana
spring.application.name=App-Monitoreo-G04

# Exponer los puntos de datos (Actuator)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Formatear la salida de mïŋ―tricas para Prometheus
management.metrics.tags.application=${spring.application.name}